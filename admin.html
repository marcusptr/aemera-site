<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AEMERA — Panneau Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f7f6;
      color: #1a1a1a;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { color: #1a6b5a; font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    .box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    input[type="password"] {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      height: 400px;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
    }
    button {
      background: #1a6b5a;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 16px;
    }
    button:disabled { background: #aaa; cursor: not-allowed; }
    button.secondary { background: #fff; color: #1a6b5a; border: 1px solid #1a6b5a; }
    .status {
      padding: 14px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
    .status.success { background: #e8f5e9; color: #1a6b5a; display: block; }
    .status.error { background: #ffebee; color: #c62828; display: block; }
    .status.loading { background: #fff8e1; color: #f57f17; display: block; }
  </style>
</head>
<body>
  <h1>AEMERA — Panneau Admin</h1>
  <p class="subtitle">Modifie ton site et publie en un clic.</p>

  <div class="box">
    <label for="password">Mot de passe admin</label>
    <input type="password" id="password" placeholder="Ton mot de passe">
    <button class="secondary" onclick="loadContent()">Charger le site actuel</button>
  </div>

  <div class="box">
    <label for="content">Code du site (index.html)</label>
    <textarea id="content" placeholder="Clique sur 'Charger le site actuel' d'abord..."></textarea>
    <button id="publishBtn" onclick="publish()" disabled>Publier le site</button>
  </div>

  <div id="status" class="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const contentEl = document.getElementById('content');
    const publishBtn = document.getElementById('publishBtn');

    function showStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    async function loadContent() {
      showStatus('Chargement du site actuel...', 'loading');
      try {
        const res = await fetch('/api/get-content');
        const data = await res.json();
        if (data.content) {
          contentEl.value = data.content;
          publishBtn.disabled = false;
          showStatus('Site chargé. Tu peux maintenant le modifier.', 'success');
        } else {
          showStatus('Erreur : ' + (data.error || 'inconnue'), 'error');
        }
      } catch (e) {
        showStatus('Erreur de chargement : ' + e.message, 'error');
      }
    }

    async function publish() {
      const password = document.getElementById('password').value;
      const content = contentEl.value;

      if (!password) { showStatus('Entre ton mot de passe.', 'error'); return; }
      if (!content) { showStatus('Le contenu est vide.', 'error'); return; }

      showStatus('Publication en cours...', 'loading');
      publishBtn.disabled = true;

      try {
        const res = await fetch('/api/publish', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, content })
        });
        const data = await res.json();
        if (data.success) {
          showStatus(data.message, 'success');
        } else {
          showStatus('Erreur : ' + (data.error || 'inconnue'), 'error');
        }
      } catch (e) {
        showStatus('Erreur de publication : ' + e.message, 'error');
      } finally {
        publishBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
